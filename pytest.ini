[pytest]
# Florida Annual Report - Pytest Configuration

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external services)
    e2e: End-to-end tests (full workflow, may use browser automation)
    slow: Slow tests (excluded from default run)
    extraction: Document extraction pipeline tests
    sunbiz: Sunbiz automation tests

# Output configuration
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Async mode for pytest-asyncio
asyncio_mode = auto

# Coverage configuration (when using pytest-cov)
# Run with: pytest --cov=src --cov-report=html

# Minimum coverage thresholds
# These align with CONSTITUTION.md Principle VI: Test-First Development
